services:
  rag:
    build: .
    image: local-rag-qwen-qdrant:latest
    depends_on:
      - qdrant
    env_file:
      - .env
    environment:
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      HF_HOME: /models
      SENTENCE_TRANSFORMERS_HOME: /models
      TRANSFORMERS_CACHE: /models
    volumes:
      - ./data:/app/data
      - ./eval:/app/eval
      - hf_cache:/models
    ports:
      - "${RAG_API_BIND:-0.0.0.0}:${RAG_API_PORT:-8000}:8000"
    command: ["python", "-m", "src.api_server"]
    restart: unless-stopped

  rag-cli:
    build: .
    image: local-rag-qwen-qdrant:latest
    profiles: ["cli"]
    stdin_open: true
    tty: true
    depends_on:
      - qdrant
    env_file:
      - .env
    environment:
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      HF_HOME: /models
      SENTENCE_TRANSFORMERS_HOME: /models
      TRANSFORMERS_CACHE: /models
    volumes:
      - ./data:/app/data
      - ./eval:/app/eval
      - hf_cache:/models
    command: ["python", "main.py"]

  qdrant:
    image: qdrant/qdrant:latest
    restart: unless-stopped
    ports:
      - "${QDRANT_HTTP_BIND:-127.0.0.1}:6333:6333"
      - "${QDRANT_GRPC_BIND:-127.0.0.1}:6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
      - QDRANT__LOG_LEVEL=INFO

volumes:
  qdrant_storage:
  hf_cache:
