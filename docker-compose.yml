services:
  rag:
    build: .
    image: local-rag-qwen-qdrant:latest
    gpus: all
    depends_on:
      - qdrant
    env_file:
      - .env
    environment:
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      HF_HOME: /models
      SENTENCE_TRANSFORMERS_HOME: /models
      TRANSFORMERS_CACHE: /models
      RAGAS_LLM_BASE_URL: ${RAGAS_LLM_DOCKER_BASE_URL:-http://vllm:8000/v1}
      RAGAS_LLM_API_KEY: ${RAGAS_LLM_API_KEY:-local-vllm-key}
      RAGAS_LLM_MODEL: ${RAGAS_LLM_MODEL:-Qwen/Qwen3-4B-Instruct-2507}
    volumes:
      - ./data:/app/data
      - ./eval:/app/eval
      - hf_cache:/models
    ports:
      - "${RAG_API_BIND:-0.0.0.0}:${RAG_API_PORT:-8000}:8000"
    command: ["python", "-m", "src.api_server"]
    restart: unless-stopped

  rag-cli:
    build: .
    image: local-rag-qwen-qdrant:latest
    gpus: all
    profiles: ["cli"]
    stdin_open: true
    tty: true
    depends_on:
      - qdrant
    env_file:
      - .env
    environment:
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      HF_HOME: /models
      SENTENCE_TRANSFORMERS_HOME: /models
      TRANSFORMERS_CACHE: /models
      RAGAS_LLM_BASE_URL: ${RAGAS_LLM_DOCKER_BASE_URL:-http://vllm:8000/v1}
      RAGAS_LLM_API_KEY: ${RAGAS_LLM_API_KEY:-local-vllm-key}
      RAGAS_LLM_MODEL: ${RAGAS_LLM_MODEL:-Qwen/Qwen3-4B-Instruct-2507}
    volumes:
      - ./data:/app/data
      - ./eval:/app/eval
      - hf_cache:/models
    command: ["python", "main.py"]

  vllm:
    image: vllm/vllm-openai:latest
    gpus: all
    ipc: host
    profiles: ["eval"]
    env_file:
      - .env
    environment:
      HF_HOME: /models
      HUGGING_FACE_HUB_TOKEN: ${HF_TOKEN:-}
    volumes:
      - hf_cache:/models
    ports:
      - "${VLLM_API_BIND:-127.0.0.1}:${VLLM_API_PORT:-8001}:8000"
    command:
      - --model
      - ${RAGAS_LLM_MODEL:-Qwen/Qwen3-4B-Instruct-2507}
      - --dtype
      - auto
      - --api-key
      - ${RAGAS_LLM_API_KEY:-local-vllm-key}
      - --generation-config
      - vllm
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    restart: unless-stopped
    ports:
      - "${QDRANT_HTTP_BIND:-127.0.0.1}:6333:6333"
      - "${QDRANT_GRPC_BIND:-127.0.0.1}:6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
      - QDRANT__LOG_LEVEL=INFO

volumes:
  qdrant_storage:
  hf_cache:
