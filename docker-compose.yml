services:
  rag:
    build: .
    image: local-rag-qwen-qdrant:latest
    gpus: all
    depends_on:
      qdrant:
        condition: service_started
      vllm:
        condition: service_healthy
    env_file:
      - path: .env
        required: false
    environment:
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      HF_HOME: /models
      SENTENCE_TRANSFORMERS_HOME: /models
      TRANSFORMERS_CACHE: /models
      GENERATOR_BASE_URL: ${GENERATOR_DOCKER_BASE_URL:-http://vllm:8000/v1}
      GENERATOR_API_KEY: ${GENERATOR_API_KEY:-local-vllm-key}
      RAGAS_LLM_BASE_URL: ${RAGAS_LLM_DOCKER_BASE_URL:-http://vllm:8000/v1}
      RAGAS_LLM_API_KEY: ${RAGAS_LLM_API_KEY:-local-vllm-key}
      RAGAS_LLM_MODEL: ${RAGAS_LLM_MODEL:-QuantTrio/Qwen3.5-9B-AWQ}
    volumes:
      - ./data:/app/data
      - ./eval:/app/eval
      - hf_cache:/models
    ports:
      - "${RAG_API_BIND:-0.0.0.0}:${RAG_API_PORT:-8000}:8000"
    command: ["python", "-m", "src.api_server"]
    restart: unless-stopped

  rag-cli:
    build: .
    image: local-rag-qwen-qdrant:latest
    gpus: all
    profiles: ["cli"]
    stdin_open: true
    tty: true
    depends_on:
      qdrant:
        condition: service_started
      vllm:
        condition: service_healthy
    env_file:
      - path: .env
        required: false
    environment:
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      HF_HOME: /models
      SENTENCE_TRANSFORMERS_HOME: /models
      TRANSFORMERS_CACHE: /models
      GENERATOR_BASE_URL: ${GENERATOR_DOCKER_BASE_URL:-http://vllm:8000/v1}
      GENERATOR_API_KEY: ${GENERATOR_API_KEY:-local-vllm-key}
      RAGAS_LLM_BASE_URL: ${RAGAS_LLM_DOCKER_BASE_URL:-http://vllm:8000/v1}
      RAGAS_LLM_API_KEY: ${RAGAS_LLM_API_KEY:-local-vllm-key}
      RAGAS_LLM_MODEL: ${RAGAS_LLM_MODEL:-QuantTrio/Qwen3.5-9B-AWQ}
    volumes:
      - ./data:/app/data
      - ./eval:/app/eval
      - hf_cache:/models
    command: ["python", "main.py"]

  rag-eval:
    build: .
    image: local-rag-qwen-qdrant:latest
    gpus: all
    profiles: ["eval"]
    depends_on:
      qdrant:
        condition: service_started
      vllm:
        condition: service_healthy
    env_file:
      - path: .env
        required: false
    environment:
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      HF_HOME: /models
      SENTENCE_TRANSFORMERS_HOME: /models
      TRANSFORMERS_CACHE: /models
      GENERATOR_BASE_URL: ${GENERATOR_DOCKER_BASE_URL:-http://vllm:8000/v1}
      GENERATOR_API_KEY: ${GENERATOR_API_KEY:-local-vllm-key}
      RAGAS_LLM_BASE_URL: ${RAGAS_LLM_DOCKER_BASE_URL:-http://vllm:8000/v1}
      RAGAS_LLM_API_KEY: ${RAGAS_LLM_API_KEY:-local-vllm-key}
      RAGAS_LLM_MODEL: ${RAGAS_LLM_MODEL:-QuantTrio/Qwen3.5-9B-AWQ}
    volumes:
      - ./data:/app/data
      - ./eval:/app/eval
      - hf_cache:/models
    command: ["python", "evaluate_ragas.py"]

  vllm:
    build:
      context: .
      dockerfile: Dockerfile.vllm
      args:
        VLLM_BASE_IMAGE: ${VLLM_BASE_IMAGE:-vllm/vllm-openai:nightly}
    image: ${VLLM_PATCHED_IMAGE:-local-vllm-qwen35-awq:latest}
    gpus: all
    ipc: host
    environment:
      HF_HOME: /models
      HF_TOKEN: ${HF_TOKEN:-}
      HUGGING_FACE_HUB_TOKEN: ${HF_TOKEN:-}
      RAGAS_LLM_API_KEY: ${RAGAS_LLM_API_KEY:-local-vllm-key}
    volumes:
      - hf_cache:/models
    ports:
      - "${VLLM_API_BIND:-127.0.0.1}:${VLLM_API_PORT:-8001}:8000"
    command:
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --model
      - ${RAGAS_LLM_MODEL:-QuantTrio/Qwen3.5-9B-AWQ}
      - --served-model-name
      - ${RAGAS_LLM_MODEL:-QuantTrio/Qwen3.5-9B-AWQ}
      - --dtype
      - auto
      - --quantization
      - "${VLLM_QUANTIZATION:-awq}"
      - --kv-cache-dtype
      - "${VLLM_KV_CACHE_DTYPE:-fp8}"
      - --max-model-len
      - "${VLLM_MAX_MODEL_LEN:-8192}"
      - --max-num-seqs
      - "${VLLM_MAX_NUM_SEQS:-1}"
      - --max-num-batched-tokens
      - "${VLLM_MAX_NUM_BATCHED_TOKENS:-8192}"
      - --no-enable-prefix-caching
      - --reasoning-parser
      - qwen3
      - --language-model-only
      - --default-chat-template-kwargs
      - '{"enable_thinking": false}'
      - --gpu-memory-utilization
      - "${VLLM_GPU_MEMORY_UTILIZATION:-0.55}"
      - --api-key
      - ${RAGAS_LLM_API_KEY:-local-vllm-key}
      - --generation-config
      - vllm
    healthcheck:
      test:
        - CMD
        - python3
        - /usr/local/bin/rag-vllm-healthcheck.py
      interval: 15s
      timeout: 10s
      retries: 80
      start_period: 30s
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    restart: unless-stopped
    ports:
      - "${QDRANT_HTTP_BIND:-127.0.0.1}:6333:6333"
      - "${QDRANT_GRPC_BIND:-127.0.0.1}:6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
      - QDRANT__LOG_LEVEL=INFO

volumes:
  qdrant_storage:
  hf_cache:
